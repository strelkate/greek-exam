<!DOCTYPE html>

<html class="dark" lang="el"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {

            extend: {

                      "on-tertiary-container": "#553e00",
                      "on-secondary": "#404366",
                      "surface": "#0b0d1a",

                      "surface-container-highest": "#222537",
                      "primary-dim": "#eeca12",
                      "secondary": "#caccf7",
                      "surface-container": "#161928",
                      "error-dim": "#d73357",
                      "surface-bright": "#282b3f",
                      "background": "#0b0d1a",
                      "error": "#ff6e84",
                      "outline": "#737485",
                      "on-primary-container": "#514300",
                      "error-container": "#a70138",
                      "primary-fixed": "#fdd828",
                      "tertiary-dim": "#ecb200",
                      "on-error-container": "#ffb2b9",
                      "surface-container-high": "#1c1e30",
                      "tertiary-fixed-dim": "#ecb200",
                      "primary-container": "#eeca12",
                      "on-primary-fixed-variant": "#665500",
                      "surface-dim": "#0b0d1a",
                      "secondary-container": "#414467",
                      "on-secondary-fixed": "#2e3154",
                      "on-background": "#eae9fd",

                      "on-tertiary": "#604700",

                      "on-primary-fixed": "#453900",
                      "on-tertiary-fixed": "#3d2b00",
                      "inverse-on-surface": "#525463",
                      "secondary-fixed": "#cccef9",

                      "body": ["Plus Jakarta Sans"],
                      "label": ["Plus Jakarta Sans"]

          },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0d1a;
            color: #eae9fd;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#0b0d1a]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#fdd828] text-2xl" data-icon="local_fire_department">local_fire_department</span>
<h1 class="text-lg font-bold text-[#fdd828] font-['Plus_Jakarta_Sans'] font-semibold tracking-tight">Greek A2</h1>
</div>
<div class="flex items-center gap-2 bg-[#1c1e30] px-4 py-1.5 rounded-full border border-outline-variant/10">
<span class="material-symbols-outlined text-[#fdd828] text-sm" data-icon="stars" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="text-sm font-bold text-[#fdd828]">1250 XP</span>
</div>
</header>
<main class="w-full max-w-2xl px-6 pt-24 pb-32 flex flex-col flex-grow items-center">
<!-- Progress Section -->
<div class="w-full mb-12">
<div class="flex justify-between items-end mb-4">
<span class="text-[10px] font-bold tracking-widest uppercase text-secondary/60">Exercise Progress</span>
<span class="text-lg font-extrabold text-primary">2 / 5</span>
</div>
<div class="h-3 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full shadow-[0px_0px_12px_rgba(253,216,40,0.4)]" style="width: 40%"></div>
</div>
</div>
<!-- Hero Graphic (Asymmetric Contextual Element) -->
<div class="relative w-full aspect-video mb-8 rounded-xl overflow-hidden shadow-2xl">
<img alt="Greek context" class="w-full h-full object-cover opacity-60 mix-blend-luminosity" data-alt="Cinematic wide shot of Santorini architecture at twilight with deep blue sky and glowing warm yellow windows against white stone" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWJS9RAlt7fLou7NFC96xswgIcT2JSeexKSMTXGJ493fjI8NLa1lZQ2GCXhTWeCUBqdeqkM6BTTXGnCNk_qPUwIb5nfobv5WzAfRt1GAPxdjE_RLl6KxleXWAVloE2XyLBuP3saUN8eNx_zP81bdqgjNFill-qE06r7WEgOZcDDs0afhlLGFnUoLqQ1gczAo2lwGeaBGqCq-UqlRVQ7Dv4TfJ-Hngl_h2yn6mhKBuDElbuQtBIx5XBrIbzNFRlN9QVHZVNxKxYHyJz"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
<div class="absolute bottom-4 left-6">
<span class="bg-primary/20 backdrop-blur-md text-primary text-[10px] font-bold tracking-widest uppercase px-3 py-1 rounded-full border border-primary/20">Reading Comprehension</span>
</div>
</div>
<!-- Question Card (The Hellenic Card) -->
<div class="w-full bg-surface-container-low p-8 rounded-xl relative overflow-hidden group">
<!-- Decorative Element -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<div class="relative z-10">
<div class="flex items-center gap-3 mb-6">
<span class="material-symbols-outlined text-secondary/40" data-icon="translate">translate</span>
<h2 class="text-sm font-bold text-secondary/60 uppercase tracking-widest">Question</h2>
</div>
<p class="text-2xl md:text-3xl font-bold leading-relaxed text-on-surface mb-8">
                    «Ο Πέτρος πηγαίνει στο <span class="text-primary underline decoration-primary/30 underline-offset-8">σχολείο</span> κάθε πρωί με το λεωφορείο.»
                </p>
<div class="bg-surface-container-highest p-6 rounded-lg border-l-4 border-primary/50">
<p class="text-on-surface-variant italic font-medium">
                        "Petros goes to school every morning by bus."
                    </p>
</div>
<div class="mt-8 pt-8 border-t border-outline-variant/10">
<h3 class="text-xl font-bold text-on-surface">
                        Petros walks to school every day.
                    </h3>
</div>
</div>
</div>
<!-- True/False Interaction Area -->
<div class="w-full mt-12 grid grid-cols-2 gap-4">
<!-- ΣΩΣΤΟ (Correct) Button -->
<button class="group flex flex-col items-center justify-center p-6 rounded-lg border-2 border-emerald-500/20 bg-emerald-500/5 hover:bg-emerald-500/10 active:scale-95 transition-all duration-300">
<div class="w-12 h-12 rounded-full border-2 border-emerald-500/40 flex items-center justify-center mb-3 group-hover:bg-emerald-500 group-hover:text-surface transition-colors">
<span class="material-symbols-outlined text-emerald-500 group-hover:text-inherit" data-icon="check">check</span>
</div>
<span class="text-lg font-black tracking-widest text-emerald-500">ΣΩΣΤΟ</span>
<span class="text-[10px] text-emerald-500/60 font-bold tracking-tighter uppercase mt-1">TRUE</span>
</button>
<!-- ΛΑΘΟΣ (Incorrect) Button -->
<button class="group flex flex-col items-center justify-center p-6 rounded-lg border-2 border-error-dim/20 bg-error-dim/5 hover:bg-error-dim/10 active:scale-95 transition-all duration-300">
<div class="w-12 h-12 rounded-full border-2 border-error-dim/40 flex items-center justify-center mb-3 group-hover:bg-error-dim group-hover:text-surface transition-colors">
<span class="material-symbols-outlined text-error-dim group-hover:text-inherit" data-icon="close">close</span>
</div>
<span class="text-lg font-black tracking-widest text-error-dim">ΛΑΘΟΣ</span>
<span class="text-[10px] text-error-dim/60 font-bold tracking-tighter uppercase mt-1">FALSE</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar (Contextual Filter Applied: Visible as top-level progress) -->
<nav class="fixed bottom-0 w-full rounded-t-xl z-50 bg-[#0b0d1a]/80 backdrop-blur-2xl shadow-[0px_-8px_24px_rgba(0,0,0,0.08)] flex justify-around items-center h-24 px-8 w-full">
<a class="flex flex-col items-center justify-center text-[#fdd828] bg-[#222537] rounded-full px-6 py-2 shadow-[0px_0px_8px_#fdd828] transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold tracking-widest uppercase mt-1">Υγεία</span>
</a>
<a class="flex flex-col items-center justify-center text-[#caccf7] opacity-60 px-6 py-2 hover:opacity-100 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold tracking-widest uppercase mt-1">Λεξικό</span>
</a>
</nav>
<!-- Floating Help Action (FAB - Suppressed Contextually per logic, but here for UI richness if needed) -->
<div class="fixed bottom-28 right-6 z-40">
<button class="w-14 h-14 bg-surface-container-highest rounded-full shadow-xl flex items-center justify-center text-primary hover:bg-primary hover:text-on-primary transition-all duration-300">
<span class="material-symbols-outlined" data-icon="lightbulb">lightbulb</span>
</button>
</div>
</body></html>
