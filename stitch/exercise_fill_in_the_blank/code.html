<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-[#0b0d1a]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full">

</div>

<div class="bg-surface-container-low rounded-xl p-8 mb-12 flex flex-col items-center justify-center text-center">

</div>

<div class="min-w-[120px] h-[3.5rem] border-b-4 border-primary/40 bg-surface-container-highest/50 rounded-t-lg flex items-center justify-center px-4 transition-all">

<span class="text-primary font-bold"></span>
</div>

</div>
<div class="mt-8 text-on-surface-variant text-sm italic">

            </div>
</div>

<div class="mt-auto">
<div class="flex flex-wrap justify-center gap-4 mb-8">
<button class="bg-surface-container-high px-8 py-4 rounded-lg font-bold text-lg text-secondary transition-all duration-300 hover:bg-surface-container-highest active:scale-90 border-b-4 border-surface-container-highest">
                    είναι
                </button>
<button class="bg-surface-container-highest px-8 py-4 rounded-lg font-bold text-lg text-primary shadow-[0px_4px_0px_#5b4c00] active:translate-y-1 active:shadow-none transition-all duration-75">

</div>
