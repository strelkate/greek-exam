<!DOCTYPE html>

<html class="dark" lang="ru"><head>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0d1a;
            color: #eae9fd;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(28, 30, 48, 0.6);
            backdrop-filter: blur(12px);
        }
    </style>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {

                        "surface-container-high": "#1c1e30",
                        "tertiary-fixed-dim": "#ecb200",
                        "primary-container": "#eeca12",
                        "on-primary-fixed-variant": "#665500",
                        "surface-dim": "#0b0d1a",
                        "secondary-container": "#414467",

                        "on-background": "#eae9fd",
                        "inverse-primary": "#705e00",
                        "on-surface-variant": "#a9aabb",
                        "surface-container-lowest": "#000000",
                        "on-tertiary": "#604700",
                        "primary": "#fdd828",
                        "on-primary-fixed": "#453900",
                        "on-tertiary-fixed": "#3d2b00",
                        "inverse-on-surface": "#525463",
                        "secondary-fixed": "#cccef9",

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0b0d1a]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#fdd828]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="text-lg font-bold text-[#fdd828] font-['Plus_Jakarta_Sans'] tracking-tight">Greek A2</span>
</div>
<div class="bg-[#1c1e30] px-4 py-1.5 rounded-full flex items-center gap-2 transition-all duration-300 active:scale-95">
<span class="text-[10px] font-bold tracking-widest uppercase text-[#caccf7]">STREAK</span>
<span class="text-[#fdd828] font-semibold">1250 XP</span>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Hero Progress Section -->
<section class="mb-10 text-center relative">
<div class="relative inline-flex items-center justify-center p-8">
<!-- Circular Progress -->
<svg class="w-48 h-48 transform -rotate-90">
<circle class="text-surface-container-high" cx="96" cy="96" fill="transparent" r="88" stroke="currentColor" stroke-width="12"></circle>
<circle class="text-primary" cx="96" cy="96" fill="transparent" r="88" stroke="currentColor" stroke-dasharray="552.92" stroke-dashoffset="193.52" stroke-width="12" style="filter: drop-shadow(0px 0px 8px #fdd828);"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center text-center">
<span class="text-4xl font-extrabold text-primary">65%</span>
<span class="text-[10px] font-bold tracking-widest uppercase text-secondary opacity-60">MASTERED</span>
</div>
</div>
<div class="mt-4">
<div class="inline-flex items-center gap-2 bg-primary/10 text-primary border border-primary/20 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">notification_important</span>
                    12 cards due today
                </div>
</div>
</section>
<!-- Stats Bento Grid -->
<section class="grid grid-cols-3 gap-3 mb-10">
<div class="bg-surface-container-high p-4 rounded-lg flex flex-col items-center justify-center text-center">
<span class="material-symbols-outlined text-secondary opacity-60 mb-2" data-icon="school">school</span>
<span class="text-xl font-bold">482</span>
<span class="text-[9px] font-bold tracking-widest uppercase text-secondary opacity-40">Total</span>
</div>
<div class="bg-surface-container-highest border border-primary/20 p-4 rounded-lg flex flex-col items-center justify-center text-center">
<span class="material-symbols-outlined text-primary mb-2" data-icon="history" style="font-variation-settings: 'FILL' 1;">history</span>
<span class="text-xl font-bold text-primary">12</span>
<span class="text-[9px] font-bold tracking-widest uppercase text-primary/60">Due today</span>
</div>
<div class="bg-surface-container-high p-4 rounded-lg flex flex-col items-center justify-center text-center">
<span class="material-symbols-outlined text-secondary opacity-60 mb-2" data-icon="new_releases">new_releases</span>
<span class="text-xl font-bold">24</span>
<span class="text-[9px] font-bold tracking-widest uppercase text-secondary opacity-40">New</span>
</div>
</section>
<!-- Main Action Area -->
<section class="mb-10">
<button class="w-full py-6 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg flex items-center justify-center gap-3 shadow-[0px_8px_24px_rgba(253,216,40,0.15)] active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_circle</span>
                Начать повторение
            </button>
<p class="text-center mt-4 text-sm text-secondary opacity-60">
                Estimated session time: 8 minutes
            </p>
</section>
<!-- Decorative Card Section (Asymmetric) -->
<section class="mb-6">
<div class="relative overflow-hidden rounded-xl bg-surface-container-low h-48 p-6 flex flex-col justify-end">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
<img alt="" class="absolute top-0 right-0 w-1/2 h-full object-cover opacity-30 mix-blend-lighten mask-gradient" data-alt="abstract architectural geometry of a classical greek white column against a deep navy sky at night" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvYVx8d1RNp1kSVpLoqK2U8MVxrMeLhQqmoBy4omyu7evYVOW7bfeI3eR58QgerpDkza4UbqKqrPtM2ZxlK85O8kOArcCcdOjDCgDYi9Ew6EoAiKi0cMWsPIEjzlQOry3ITevDxRNf-zD2pkyibwgi-aheh9R8PNgrVAF-kcRL1d9-1RrOFq4LUf92NjyF9mA6xfLt_R_PccsEJdEmTCCECMN-E3X_oEEKAeayrLwZl9ox-22nKbsOl-DHX8agJcGJRQiR7Y4gk6zL"/>
<div class="relative z-10">
<h3 class="text-xl font-bold mb-1">Weekly Challenge</h3>
<p class="text-sm text-secondary/70 max-w-[180px]">Learn 50 new adjectives about travel and leisure.</p>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full rounded-t-[3rem] z-50 bg-[#0b0d1a]/80 backdrop-blur-2xl shadow-[0px_-8px_24px_rgba(0,0,0,0.08)] flex justify-around items-center h-24 px-8 w-full">
<!-- Tab 1: Учёба -->
<div class="flex flex-col items-center justify-center text-[#caccf7] opacity-60 px-6 py-2 hover:opacity-100 active:scale-90 transition-transform">
<span class="material-symbols-outlined mb-1" data-icon="school">school</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold tracking-widest uppercase">Учёба</span>
</div>
<!-- Tab 2: Словарь (ACTIVE) -->
<div class="flex flex-col items-center justify-center text-[#fdd828] bg-[#222537] rounded-full px-6 py-2 shadow-[0px_0px_8px_#fdd828] active:scale-90 transition-transform">
<span class="material-symbols-outlined mb-1" data-icon="menu_book" style="font-variation-settings: 'FILL' 1;">menu_book</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold tracking-widest uppercase">Словарь</span>
</div>
</nav>
<style>
        /* Custom mask for the decorative image */
        .mask-gradient {
            mask-image: linear-gradient(to left, rgba(0,0,0,1), rgba(0,0,0,0));
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1), rgba(0,0,0,0));
        }
    </style>
</body></html>
