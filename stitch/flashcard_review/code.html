<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-gradient {
            background: linear-gradient(135deg, #fdd828 0%, #eeca12 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col">
<header class="fixed top-0 w-full z-50 bg-[#0b0d1a]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#fdd828]" data-icon="local_fire_department">local_fire_department</span>
<span class="font-['Plus_Jakarta_Sans'] font-semibold tracking-tight text-lg font-bold text-[#fdd828]">Greek A2</span>
</div>
<div class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-surface-container-high">
<span class="text-[10px] font-bold tracking-widest uppercase opacity-60">STREAK</span>
<span class="font-bold text-[#fdd828]">1250 XP</span>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-20 pb-32">
<div class="w-full max-w-md aspect-[3/4] relative group">
<div class="absolute inset-0 bg-primary/5 blur-[80px] rounded-full scale-75 transition-opacity group-hover:opacity-100"></div>
<div class="relative w-full h-full bg-surface-container-high rounded-xl p-8 flex flex-col items-center justify-center text-center shadow-[0px_0px_40px_rgba(0,0,0,0.2)] border border-outline-variant/10">
<div class="absolute top-8 left-8 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant">Reviewing</span>
</div>
<div class="flex flex-col items-center gap-8">
<button class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center text-primary transition-all duration-300 active:scale-90 hover:bg-primary/10">
<span class="material-symbols-outlined text-3xl" data-icon="volume_up">volume_up</span>
</button>
<div class="space-y-4">
<h1 class="text-5xl font-extrabold tracking-tight text-on-surface">Γεια σας</h1>
<p class="text-on-surface-variant text-sm font-medium">Common Greeting • A2</p>
</div>
</div>
<div class="absolute bottom-8 right-8 flex items-center gap-2 text-on-surface-variant/60 group-hover:text-primary transition-colors cursor-pointer">
<span class="text-[10px] font-bold tracking-widest uppercase">Flip</span>
<span class="material-symbols-outlined text-sm" data-icon="sync">sync</span>
</div>
</div>
</div>
<div class="fixed bottom-32 left-0 w-full px-6 flex justify-center gap-4 max-w-md mx-auto">
<button class="flex-1 h-16 bg-surface-container-high rounded-full flex items-center justify-center gap-3 transition-all duration-300 active:scale-95 border border-error/20 hover:bg-error/5 group">
<span class="material-symbols-outlined text-error" data-icon="close">close</span>
<span class="font-bold text-on-surface uppercase tracking-widest text-[10px]">Не знал</span>
</button>
<button class="flex-1 h-16 glass-gradient rounded-full flex items-center justify-center gap-3 transition-all duration-300 active:scale-95 shadow-[0px_8px_24px_rgba(253,216,40,0.2)] group">
<span class="material-symbols-outlined text-on-primary" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
<span class="font-bold text-on-primary uppercase tracking-widest text-[10px]">Знал</span>
</button>
</div>
</main>
<nav class="fixed bottom-0 w-full rounded-t-[3rem] z-50 bg-[#0b0d1a]/80 backdrop-blur-2xl shadow-[0px_-8px_24px_rgba(0,0,0,0.08)] flex justify-around items-center h-24 px-8 w-full">
<a class="flex flex-col items-center justify-center text-[#fdd828] bg-[#222537] rounded-full px-6 py-2 shadow-[0px_0px_8px_#fdd828] transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold tracking-widest uppercase">Учёба</span>
</a>
<a class="flex flex-col items-center justify-center text-[#caccf7] opacity-60 px-6 py-2 hover:opacity-100 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="menu_book">menu_book</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold tracking-widest uppercase">Словарь</span>
</a>
</nav>
<div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
<div class="absolute top-1/4 -left-20 w-80 h-80 bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-secondary/5 rounded-full blur-[150px]"></div>
</div>
