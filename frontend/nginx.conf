server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Audio files — content-addressed (hash in name), cache aggressively
    location /audio/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static SPA — fallback to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
