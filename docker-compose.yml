version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: greekapp
      POSTGRES_USER: greekapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greekapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://greekapp:${POSTGRES_PASSWORD}@postgres/greekapp
      BOT_TOKEN: ${BOT_TOKEN}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://your-frontend.vercel.app"]}
      DEBUG: "false"
      AUDIO_DIR: "/audio"
    volumes:
      - ./backend/audio:/audio:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
